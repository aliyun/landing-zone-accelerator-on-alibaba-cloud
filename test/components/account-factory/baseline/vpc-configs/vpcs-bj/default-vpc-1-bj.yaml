vpc_name: default-vpc-1
vpc_cidr: 10.12.0.0/16
vpc_description: Default VPC
vpc_tags:
  Environment: test
  Project: landing-zone
vswitches:
  - vswitch_name: vpc-bj-1-vswitch-1
    cidr_block: 10.12.1.0/24
    zone_id: cn-beijing-j
    description: VPC BJ 1 vswitch 1
    purpose: TR
    tags:
      Environment: test
      Project: landing-zone
  - vswitch_name: vpc-bj-1-vswitch-2
    cidr_block: 10.12.2.0/24
    zone_id: cn-beijing-k
    description: VPC BJ 1 vswitch 2
    purpose: TR
    tags:
      Environment: test
      Project: landing-zone
  - vswitch_name: vpc-bj-1-vswitch-3
    cidr_block: 10.12.3.0/24
    zone_id: cn-beijing-l
    description: VPC BJ 1 vswitch 3
    purpose: TR
    tags:
      Environment: test
      Project: landing-zone
enable_acl: false
cen_attachment:
  enabled: true
  cen_tr_attachment_name: vpc-bj-tr-attachment
  cen_tr_attachment_description: CEN attachment for VPC in Beijing
  vpc_route_entries:
    - destination_cidrblock: 0.0.0.0/0
      name: route-to-tr
security_groups:
  - security_group_name: default-sg-bj-1
    description: Default security group for VPC 1 in Beijing
    security_group_type: normal
    tags:
      Environment: test
      Project: landing-zone
    rules:
      - type: ingress
        ip_protocol: icmp
        port_range: "-1/-1"
        cidr_ip: 0.0.0.0/0
        policy: accept
        priority: 1
        nic_type: intranet
        description: Allow ICMP access

